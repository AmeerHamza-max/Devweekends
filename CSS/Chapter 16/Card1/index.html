<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100%;
            min-height: 1300px;
            background-color: #8bC6EC;
            background-image: linear-gradient(135deg,#8bC6EC 0%,#8bC6EC 100%);
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .card{
            width: 280px;
            height: 500px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }
        .card img{
            height: 57%;
            border-radius: 15px;

        }
        .card h2{
            font-weight: bold;
            font-size: 1.09rem;
        }
        .card p {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="qr code blue.jpg" alt="qr code">
            <h2>Improve your front end skills by developing projects</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Corporis, deleniti debitis voluptatem animi facilis placeat explicabo accusamus aperiam.</p>
        </div>
    </div>
</body>
</html>
