<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 1px solid black;
        }
        img{
            margin-left: 10px;

        }
        .image2{
            position: absolute;
            top: 100px;
            left: 50px;
        }
        .container{
            position: relative;
            height: 8000px;
        }
        .image4{
            position: fixed;
        }
        .image3{
            position: sticky;
        }
        .box{
            background-color: aquamarine;
            height: 5000px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./poster2.jpeg" alt="poster1" width="200px" height="200px" class="image1">
        <img src="./poster3.png" alt="poster1" width="200px" height="200px" class="image2">
        <img src="./poster1.jpeg" alt="poster1" width="200px" height="200px" class="image3">
        <img src="./poster4.png" alt="poster1" width="200px" height="200px" class="image4">
    </div>
    <div class="box">

    </div>
</body>
</html>
