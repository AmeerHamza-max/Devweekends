<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input Types Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="tel"],
        input[type="url"],
        input[type="search"],
        input[type="date"],
        input[type="time"],
        input[type="datetime-local"],
        input[type="month"],
        input[type="week"],
        textarea,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        input:focus,
        textarea:focus,
        select:focus{
            border-color:dodgerblue;
        }

        textarea{
            resize:vertical;
        }

        .radio-group,
        .checkbox-group{
            margin-top:10px;
        }

        .radio-group label,
        .checkbox-group label{
            display:inline-block;
            margin-right:20px;
            font-weight:normal;
        }

        input[type="submit"],
        input[type="reset"],
        input[type="button"]{
            padding:10px 20px;
            border:none;
            background:dodgerblue;
            color:white;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
            margin-right:10px;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover,
        input[type="button"]:hover{
            background:#0056b3;
        }

        input[type="range"]{
            width:100%;
        }

        hr{
            margin:20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HTML Input Types Demo</h1>

        <form>

            <label>Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <label>Email</label>
            <input type="email" placeholder="Enter email">

            <label>Age</label>
            <input type="number" min="1" max="100">

            <label>Phone Number</label>
            <input type="tel" placeholder="03XX-XXXXXXX">

            <label>Website</label>
            <input type="url" placeholder="https://example.com">

            <label>Search</label>
            <input type="search" placeholder="Search here">

            <label>Date</label>
            <input type="date">

            <label>Time</label>
            <input type="time">

            <label>Date & Time</label>
            <input type="datetime-local">

            <label>Month</label>
            <input type="month">

            <label>Week</label>
            <input type="week">

            <label>Choose Color</label>
            <input type="color">

            <label>Volume</label>
            <input type="range" min="0" max="100">

            <div class="checkbox-group">
                <label>
                    <input type="checkbox">
                    I Agree
                </label>
            </div>

            <div class="radio-group">
                <label>
                    <input type="radio" name="gender">
                    Male
                </label>

                <label>
                    <input type="radio" name="gender">
                    Female
                </label>
            </div>

            <label>Upload File</label>
            <input type="file">

            <input type="hidden" value="123">

            <hr>

            <label>Country</label>
            <select>
                <option>Pakistan</option>
                <option>India</option>
                <option>Turkey</option>
                <option>UAE</option>
            </select>

            <label>Message</label>
            <textarea rows="5" placeholder="Write something..."></textarea>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
            <input type="button" value="Button">

        </form>
    </div>

</body>
</html>
