<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - HTML</title>
    <style>
        /* General Page Styling */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    padding: 30px;
}

/* Heading */
h1 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

/* Table Styling */
table {
    width: 80%;
    margin: auto;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

/* Table Header */
thead {
    background-color: #007bff;
    color: white;
}

th {
    padding: 15px;
    text-align: left;
    font-size: 18px;
}

/* Table Body */
td {
    padding: 12px 15px;
    border-bottom: 1px solid #ddd;
}

/* Alternate Row Colors */
tbody tr:nth-child(even) {
    background-color: #f8f9fa;
}

/* Hover Effect */
tbody tr:hover {
    background-color: #e9f3ff;
    cursor: pointer;
    transition: 0.3s;
}

/* Responsive Table */
@media (max-width: 768px) {
    table {
        width: 100%;
    }

    th,
    td {
        padding: 10px;
        font-size: 14px;
    }
}
    </style>
</head>
<body>
    <h1>Tables in HTML</h1>
    <table>
        <!-- Head of the table  -->
       <thead>
        <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Salary</th>
        </tr>
       </thead> 
       <!-- Body of the table -->
       <tbody>
        <tr>
            <td>Harry</td>
            <td>Software Developer</td>
            <td>$7000</td>
        </tr>
         <tr>
            <td>Hamza</td>
            <td>ML Engineer </td>
            <td>$700</td>
        </tr>
         <tr>
            <td>Adeel</td>
            <td>Web Developer</td>
            <td>$100000</td>
        </tr>
         <tr>
            <td>Junaid</td>
            <td>Software Developer</td>
            <td>$2000</td>
        </tr>
        <tr>
            <td colspan="3">Thanks</td>
        </tr>
       </tbody>
    </table>
</body>
</html>
