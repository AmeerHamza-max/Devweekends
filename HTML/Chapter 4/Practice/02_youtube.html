<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Poster</title>

    <style>
        img{
            width: 600px;
            max-width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }

</head>

             alt="Video Thumbnail">
    </a>

</html>
